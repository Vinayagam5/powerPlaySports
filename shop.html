<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPlay Sports | Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">POWERPLAY <span>SPORTS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
    </nav>

    <section class="shop-container">
        <h2>OUR <span>GEAR</span></h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img placeholder-1"></div>
                <div class="product-info">
                    <h3>Pro Basketball</h3>
                    <p class="price">$35.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-img placeholder-2"></div>
                <div class="product-info">
                    <h3>Elite Soccer Cleats</h3>
                    <p class="price">$120.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-img placeholder-3"></div>
                <div class="product-info">
                    <h3>Carbon Tennis Racket</h3>
                    <p class="price">$150.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-img placeholder-4"></div>
                <div class="product-info">
                    <h3>Heavyweight Boxing Gloves</h3>
                    <p class="price">$65.00</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast hidden">Item added to cart!</div>

    <footer>
        <p>&copy; 2026 PowerPlay Sports. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
